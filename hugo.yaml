enableRobotsTXT: true
minify:
    disableXML: true
    minifyOutput: true
baseurl: https://explorable-explanations.com/
languageCode: ja-jp
theme: hugo-theme-stack
title: Explorable Explanations
copyright: Example Person

ignoreFiles:
    - "/node_modules/"
    - "/source/"
    - "/public/"
    - "/server-side/"
    - "/.git/"
    - "/.claude/"
    - "/paper/"
    - "/reference_repo/"
    - "\\.rst$"

# Theme i18n support
# Available values: ar, bn, ca, de, el, en, es, fr, hu, id, it, ja, ko, nl, pt-br, th, uk, zh-cn, zh-hk, zh-tw
DefaultContentLanguage: ja

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage: true

languages:
    ja:
        languageName: 日本語
        title: Explorable Explanations
        weight: 1
        params:
            sidebar:
                subtitle: インタラクティブな記事で学ぶAIとデータ可視化
    en:
        languageName: English
        title: Explorable Explanations
        weight: 2
        params:
            sidebar:
                subtitle: The only authentic data visualization course in Japan.

services:
    # Change it to your Disqus shortname before using
    disqus:
        shortname:
    # GA Tracking ID
    googleAnalytics:
        id:

pagination:
    pagerSize: 20

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: # e.g.: favicon placed in `static/favicon.ico` of your site folder, then set this field to `/favicon.ico` (`/` is necessary)

    footer:
        since: 2020
        customText:

    dateFormat:
        published: 2006年1月2日
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        emoji: 📊
        subtitle: 
        avatar:
            enabled: true
            local: true
            src: img/avatar.png
        author:
            name: 矢崎裕一／Yuichi Yazaki
            image: img/avatar.png
            bio: 株式会社ビジネス・アーキテクツにてユーザー・インターフェイス・デザイナーおよびアート・ディレクターを7年間経験後、独立。企業や教育機関での講義活動、ウェブサイトVisualizing.JPにおける情報発信、コミュニティData Visualization Japanにおけるコミュニティ活動など、データ可視化の実践と普及に関するさまざまな活動をおこなっている。共著書に『RESASの教科書』(日経BP、2016)がある。千葉工業大学デザイン科学修士修了。データ・ビジュアライゼーション・ジャパン発起人/Yahoo!ニュース・エキスパート。

    article:
        math: false
        toc: true
        readingTime: true
        license:
            enabled: true
            default: Licensed under CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider: disqus

        disqusjs:
            shortname:
            apiUrl:
            apiKey:
            admin:
            adminLabel:

        utterances:
            repo:
            issueTerm: pathname
            label:

        beaudar:
            repo:
            issueTerm: pathname
            label:
            theme:

        remark42:
            host:
            site:
            locale:

        vssue:
            platform:
            owner:
            repo:
            clientId:
            clientSecret:
            autoCreateIssue: false

        # Waline client configuration see: https://waline.js.org/en/reference/component.html
        waline:
            serverURL:
            lang:
            pageview:
            emoji:
                - https://unpkg.com/@waline/emojis@1.0.1/weibo
            requiredMeta:
                - name
                - email
                - url
            locale:
                admin: Admin
                placeholder:

        twikoo:
            envId:
            region:
            path:
            lang:

        # See https://cactus.chat/docs/reference/web-client/#configuration for description of the various options
        cactus:
            defaultHomeserverUrl: "https://matrix.cactus.chat:8448"
            serverName: "cactus.chat"
            siteName: "" # You must insert a unique identifier here matching the one you registered (See https://cactus.chat/docs/getting-started/quick-start/#register-your-site)

        giscus:
            repo:
            repoID:
            category:
            categoryID:
            mapping:
            lightTheme:
            darkTheme:
            reactionsEnabled: 1
            emitMetadata: 0

        gitalk:
            owner:
            admin:
            repo:
            clientID:
            clientSecret:
            proxy:

        cusdis:
            host:
            id:
    widgets:
        homepage:
            - type: categories
            - type: tag-cloud
        page:
            - type: toc

    opengraph:
        twitter:
            # Your Twitter username
            site: visualizing_jp

            # Available values: summary, summary_large_image
            card: summary

    defaultImage:
        opengraph:
            enabled: true
            local: false
            src: img/avatar.png

    colorScheme:
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: auto

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

### Custom menu
### See https://stack.jimmycai.com/config/menu
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
menu:
    main:
        - name: ホーム
          pageRef: /
          weight: -60
          params:
              icon: home
        - name: AIモデル
          pageRef: /categories/ai-model
          weight: 10
          params:
              icon: infinity
        - name: ライブラリ
          pageRef: /categories/library
          weight: 20
          params:
              icon: archives
        - name: 可視化の原理
          pageRef: /categories/data-viz
          weight: 25
          params:
              icon: hash
        - name: コンテンツ
          pageRef: /categories/contents
          weight: 30
          params:
              icon: categories


related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                    inline:
                        - - \(
                          - \)
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
